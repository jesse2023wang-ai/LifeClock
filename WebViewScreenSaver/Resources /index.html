<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Life Fliqlo — 单行显示</title>
<style>
html,body{height:100%;margin:0;background:#000;color:#fff;font-family:'Helvetica Neue',Arial,sans-serif;}
.screen{height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;}
.flip-row{display:flex;gap:1vmin;align-items:center;justify-content:center;flex-wrap:nowrap;white-space:nowrap;overflow:hidden;padding:2vmin;}
.flip{position:relative;perspective:1000px;width:10vmin;height:18vmin;background:#111;border-radius:1vmin;box-shadow:0 .6vmin 1.2vmin rgba(0,0,0,.6) inset,0 1vmin 2vmin rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;overflow:visible;}
.flip .card{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
.digit{font-size:11vmin;font-weight:700;line-height:1;}
.card .top,.card .bottom,.card .next-top,.card .next-bottom{position:absolute;left:0;right:0;overflow:hidden;height:50%;}
.card .top{top:0;border-bottom:1px solid rgba(255,255,255,.06);transform-origin:bottom;background:linear-gradient(#222,#111);}
.card .bottom{bottom:0;border-top:1px solid rgba(255,255,255,.02);transform-origin:top;background:linear-gradient(#111,#000);}
.card .top .digit,.card .bottom .digit{display:flex;align-items:flex-end;justify-content:center;padding-bottom:0.6vmin;height:100%;}
.card .next-top{top:0;transform-origin:bottom;transform:rotateX(90deg);}
.card .next-bottom{bottom:0;transform-origin:top;transform:rotateX(-90deg);}
.flip.flip-animate .card .top{animation:flipTop .45s forwards;}
.flip.flip-animate .card .next-bottom{animation:revealBottom .45s .45s forwards;}
@keyframes flipTop{0%{transform:rotateX(0)}100%{transform:rotateX(-90deg)}}
@keyframes revealBottom{0%{transform:rotateX(90deg)}100%{transform:rotateX(0deg)}}
.sep{font-size:6vmin;color:#bbb;padding:0 0.6vmin;}
.colon{font-size:10vmin;color:#bbb;padding:0 0.4vmin;}
@media (max-width:600px){
  .flip{width:16vmin;height:26vmin;}
  .digit{font-size:16vmin;}
  .sep{font-size:8vmin;}
  .colon{font-size:12vmin;}
}
</style>
</head>
<body>
<div class="screen" id="screen">
  <div class="flip-row" id="flipRow"></div>
  <div style="height:3vmin"></div>
  <div class="label">自出生日期起经过的总时间 — 天 / 时:分:秒</div>
</div>

<script>
// === 固定出生日期 ===
const startDate = new Date("2000-01-01T08:30:00"); // 修改为你想要的出生日期

// 翻页数字逻辑
function createFlipCell(initial){
  const wrap = document.createElement('div');
  wrap.className='flip';
  wrap.innerHTML=`<div class="card">
    <div class="top"><div class="digit">${initial}</div></div>
    <div class="bottom"><div class="digit">${initial}</div></div>
    <div class="next-top"><div class="digit">${initial}</div></div>
    <div class="next-bottom"><div class="digit">${initial}</div></div>
  </div>`;
  return wrap;
}

const flipRow=document.getElementById('flipRow');
const daysCells=[],hourCells=[],minuteCells=[],secondCells=[];

function buildFlipStructure(){
  flipRow.innerHTML='';
  for(let i=0;i<5;i++){const c=createFlipCell('0');flipRow.appendChild(c);daysCells.push(c);}
  const daySep=document.createElement('div');daySep.className='sep';daySep.textContent='天';flipRow.appendChild(daySep);
  for(let i=0;i<2;i++){const c=createFlipCell('0');flipRow.appendChild(c);hourCells.push(c);}
  const colon1=document.createElement('div');colon1.className='colon';colon1.textContent=':';flipRow.appendChild(colon1);
  for(let i=0;i<2;i++){const c=createFlipCell('0');flipRow.appendChild(c);minuteCells.push(c);}
  const colon2=document.createElement('div');colon2.className='colon';colon2.textContent=':';flipRow.appendChild(colon2);
  for(let i=0;i<2;i++){const c=createFlipCell('0');flipRow.appendChild(c);secondCells.push(c);}
}

buildFlipStructure();

function pad(num,len){let s=String(num);while(s.length<len)s='0'+s;return s;}
function computeSince(start){
  const now=new Date();
  let diff=Math.max(0,now-start);
  const sec=Math.floor(diff/1000)%60;
  const min=Math.floor(diff/60000)%60;
  const hr=Math.floor(diff/3600000)%24;
  const days=Math.floor(diff/86400000);
  return {days,hr,min,sec};
}
function setFlipValue(flipEl,value){
  const top=flipEl.querySelector('.top .digit');
  const bottom=flipEl.querySelector('.bottom .digit');
  const nextTop=flipEl.querySelector('.next-top .digit');
  const nextBottom=flipEl.querySelector('.next-bottom .digit');
  const current=top.textContent;
  if(current===value)return;
  nextTop.textContent=value;nextBottom.textContent=value;
  flipEl.classList.remove('flip-animate');bottom.textContent=current;
  requestAnimationFrame(()=>{
    flipEl.classList.add('flip-animate');
    setTimeout(()=>{
      top.textContent=value;bottom.textContent=value;
      flipEl.classList.remove('flip-animate');
    },900);
  });
}
function updateDisplay(start){
  const t=computeSince(start);
  const daysStr=pad(t.days,5);
  const hStr=pad(t.hr,2);
  const mStr=pad(t.min,2);
  const sStr=pad(t.sec,2);
  for(let i=0;i<5;i++)setFlipValue(daysCells[i],daysStr[i]);
  for(let i=0;i<2;i++)setFlipValue(hourCells[i],hStr[i]);
  for(let i=0;i<2;i++)setFlipValue(minuteCells[i],mStr[i]);
  for(let i=0;i<2;i++)setFlipValue(secondCells[i],sStr[i]);
}

// 启动循环
function tick(){
  updateDisplay(startDate);
  setTimeout(tick,1000-(Date.now()%1000));
}
tick();
</script>
</body>
</html>
