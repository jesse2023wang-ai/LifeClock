name: CI

on: [push]

jobs:
  build:

    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
    - name: build
      run: ./archive.sh
    - name: 'Store Artifact'
      uses: actions/upload-artifact@v4
      with:
        name: WebViewScreenSaver.saver
        path: WebViewScreenSaver.saver.zip
