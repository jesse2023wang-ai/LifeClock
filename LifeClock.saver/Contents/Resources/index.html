<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Life Fliqlo — Enlarged Display</title>
<style>
html, body {
  height: 100%;
  margin: 0;
  background: #000;
  color: #fff;
  font-family: 'Helvetica Neue', Arial, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background-color 0.3s, opacity 0.3s;
  overflow: hidden;
}
.screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  transform-origin: center center;
}
.flip-row {
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: 2vmin;
  font-weight: 700;
}
.flip {
  display: flex;
  flex-direction: column;
  align-items: center;
  font-size: 20vmin;
}
.label {
  margin-top: 0.5vmin;
  font-size: 6vmin;
  color: #777;
}
.colon {
  font-size: 20vmin;
  color: #bbb;
  align-self: flex-end;
}
.units-row {
  display: flex;
  justify-content: center;
  gap: 8vmin;
  margin-top: 1vmin;
  font-size: 6vmin;
  color: #777;
}
@media (max-width:600px){
  .flip { font-size: 32vmin; }
  .colon { font-size: 32vmin; }
  .units-row { font-size: 8vmin; gap: 12vmin; }
}
</style>
</head>
<body>
<div class="screen" id="screen">
  <div class="flip-row" id="flipRow">
    <div class="flip" id="blockDays"></div>
    <div class="colon">:</div>
    <div class="flip" id="blockHr"></div>
    <div class="colon">:</div>
    <div class="flip" id="blockMin"></div>
    <div class="colon">:</div>
    <div class="flip" id="blockSec"></div>
  </div>
  <div class="units-row" id="unitsRow">
    <span id="unitDays">DAYS</span>
    <span id="unitHr">HOURS</span>
    <span id="unitMin">MINUTES</span>
    <span id="unitSec">SECONDS</span>
  </div>
</div>

<script>
const defaultBirthDate = new Date("2000-01-01T00:00:00");

let config = window.screensaverConfig || {
  timeFormat: '00-23',
  birthDate: defaultBirthDate,
  scale: 0.7,
  brightness: 0.3,
  showBackground: true,
  multiMonitor: true
};

let startDate = config.birthDate || defaultBirthDate;

// Cache DOM references — created once in HTML, never destroyed
const blocks = {
  days: document.getElementById('blockDays'),
  hr:   document.getElementById('blockHr'),
  min:  document.getElementById('blockMin'),
  sec:  document.getElementById('blockSec')
};
const colons = document.querySelectorAll('.colon');
const units = {
  days: document.getElementById('unitDays'),
  hr:   document.getElementById('unitHr'),
  min:  document.getElementById('unitMin'),
  sec:  document.getElementById('unitSec')
};
const screenEl = document.getElementById('screen');

function pad(num, len) {
  let s = String(num);
  while (s.length < len) s = '0' + s;
  return s;
}

function computeSince(start) {
  const now = new Date();
  const diff = Math.max(0, now - start);
  const sec = Math.floor(diff / 1000) % 60;
  const min = Math.floor(diff / 60000) % 60;
  let hr = Math.floor(diff / 3600000) % 24;
  const days = Math.floor(diff / 86400000);

  if (config.timeFormat === '01-12') {
    hr = hr % 12;
    if (hr === 0) hr = 12;
  }

  return { days, hr, min, sec };
}

// Incremental update — only changes textContent, no DOM recreation
function updateDisplay() {
  const t = computeSince(startDate);

  blocks.days.textContent = pad(t.days, 5);
  blocks.hr.textContent   = pad(t.hr, 2);
  blocks.min.textContent  = pad(t.min, 2);
  blocks.sec.textContent  = pad(t.sec, 2);
}

function applyConfig() {
  if (!config.showBackground) {
    document.body.style.background = 'transparent';
  }

  const brightness = Math.floor(config.brightness * 255);
  document.body.style.color = `rgb(${brightness}, ${brightness}, ${brightness})`;

  const labelBrightness = Math.floor(config.brightness * 119);
  colons.forEach(function(colon) {
    colon.style.color = `rgb(${labelBrightness}, ${labelBrightness}, ${labelBrightness})`;
  });
  Object.values(units).forEach(function(unit) {
    unit.style.color = `rgb(${labelBrightness}, ${labelBrightness}, ${labelBrightness})`;
  });

  // 智能缩放：当内容超出视口时自动缩小，锁屏全屏通常不受影响
  screenEl.style.transform = 'none';
  const rect = screenEl.getBoundingClientRect();
  const maxWidthScale = window.innerWidth / rect.width;
  const maxHeightScale = window.innerHeight / rect.height;
  const maxScale = Math.min(maxWidthScale, maxHeightScale, 1);
  const finalScale = Math.min(config.scale, maxScale);
  screenEl.style.transform = `scale(${finalScale})`;

  if (config.timeFormat === '中文') {
    units.days.textContent = '天';
    units.hr.textContent   = '时';
    units.min.textContent  = '分';
    units.sec.textContent  = '秒';
  } else {
    units.days.textContent = 'DAYS';
    units.hr.textContent   = 'HOURS';
    units.min.textContent  = 'MINUTES';
    units.sec.textContent  = 'SECONDS';
  }
}

function tick() {
  updateDisplay();
  setTimeout(tick, 1000 - (Date.now() % 1000));
}

// Allow Objective-C to re-inject config after page loads
window.reconfigureScreenSaver = function(newConfig) {
  config = newConfig;
  startDate = config.birthDate || defaultBirthDate;
  applyConfig();
  updateDisplay();
};

applyConfig();
tick();
</script>
</body>
</html>
